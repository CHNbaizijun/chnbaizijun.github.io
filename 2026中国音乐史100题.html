<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在线考试 · 逐题判断</title>
    <style>
        /* ===== 基础变量（亮色） ===== */
        :root {
            --bg-body: #f0f2f5;
            --bg-container: white;
            --bg-nav: #f7f8fa;
            --border-color: #d0d4dd;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --bg-cell: white;
            --cell-border: #cbd5e1;
            --bg-option: #f8fafc;
            --option-border: #e2e8f0;
            --bg-feedback: #f1f5f9;
            --feedback-border: #e2e8f0;
            --btn-bg: #f8fafc;
            --btn-border: #cbd5e1;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --correct-bg: #22c55e;
            --wrong-bg: #ef4444;
            --forgot-bg: #eab308;
            --active-outline: #2563eb;
            --feedback-correct-bg: #dcfce7;
            --feedback-wrong-bg: #fee2e2;
            --feedback-correct-text: #15803d;
            --feedback-wrong-text: #b91c1c;
            --result-stats-bg: #f1f5f9;
            --result-border: #d0d4dd;
        }

        /* ===== 暗黑模式变量 ===== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f0f1a;
                --bg-container: #1a1a2e;
                --bg-nav: #16162a;
                --border-color: #3a3a4a;
                --text-primary: #e0e0e0;
                --text-secondary: #a0a0b0;
                --bg-cell: #252540;
                --cell-border: #44445a;
                --bg-option: #22223a;
                --option-border: #3a3a52;
                --bg-feedback: #2a2a42;
                --feedback-border: #44445a;
                --btn-bg: #2a2a42;
                --btn-border: #44445a;
                --shadow: 0 4px 12px rgba(0,0,0,0.6);
                --correct-bg: #22c55e;
                --wrong-bg: #ef4444;
                --forgot-bg: #ca8a04;
                --active-outline: #60a5fa;
                --feedback-correct-bg: #1a3a2a;
                --feedback-wrong-bg: #3a1a1a;
                --feedback-correct-text: #86efac;
                --feedback-wrong-text: #fca5a5;
                --result-stats-bg: #1a1a30;
                --result-border: #3a3a4a;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            transition: background 0.2s;
        }
        .exam-container {
            max-width: 1400px;
            width: 100%;
            background: var(--bg-container);
            box-shadow: var(--shadow);
            display: flex;
            height: 90vh;
            min-height: 600px;
            position: relative;
            transition: background 0.2s;
        }

        /* 左侧网格导航 */
        .grid-nav {
            width: 200px;
            min-width: 200px;
            background: var(--bg-nav);
            padding: 16px 12px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, background 0.2s;
        }
        .grid-nav h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-align: center;
        }
        .grid-10x10 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            background: transparent;
        }
        .grid-cell {
            aspect-ratio: 1 / 1;
            background: var(--bg-cell);
            border: 1px solid var(--cell-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: background 0.1s;
            cursor: pointer;
        }
        .grid-cell:hover {
            background: #e9edf4;
        }
        @media (prefers-color-scheme: dark) {
            .grid-cell:hover {
                background: #3a3a5a;
            }
        }
        .grid-cell.correct {
            background: var(--correct-bg);
            color: white;
            border-color: #16a34a;
        }
        .grid-cell.wrong {
            background: var(--wrong-bg);
            color: white;
            border-color: #dc2626;
        }
        .grid-cell.forgot {
            background: var(--forgot-bg);
            color: white;
            border-color: #a16207;
        }
        .grid-cell.active {
            outline: 3px solid var(--active-outline);
            outline-offset: -1px;
            z-index: 2;
            position: relative;
        }
        .grid-cell.empty {
            background: var(--bg-cell);
            color: var(--text-secondary);
        }
        .legend {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-swatch {
            width: 14px;
            height: 14px;
            border: 1px solid var(--cell-border);
        }
        .legend-swatch.green { background: var(--correct-bg); }
        .legend-swatch.red { background: var(--wrong-bg); }
        .legend-swatch.yellow { background: var(--forgot-bg); }
        .legend-swatch.gray { background: var(--bg-cell); }
        .progress-stats {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg-feedback);
            padding: 4px 8px;
            text-align: center;
        }

        /* 移动端折叠按钮 */
        .toggle-nav-btn {
            display: none;
            position: absolute;
            left: 0;
            top: 10px;
            z-index: 10;
            background: var(--active-outline);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }
        .toggle-nav-btn:hover {
            filter: brightness(0.9);
        }

        /* 右侧答题区 */
        .question-panel {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            background: var(--bg-container);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background 0.2s;
        }
        .question-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }
        .question-number {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .question-number span {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 15px;
        }
        .question-type {
            background: var(--bg-feedback);
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-primary);
            font-weight: 500;
            background: var(--bg-feedback);
            padding: 14px 16px;
            border-left: 4px solid var(--active-outline);
            margin-bottom: 24px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--bg-option);
            border: 1px solid var(--option-border);
            transition: 0.1s;
            cursor: pointer;
        }
        .option-item:hover:not(.disabled) {
            background: #f1f5f9;
        }
        @media (prefers-color-scheme: dark) {
            .option-item:hover:not(.disabled) {
                background: #2a2a4a;
            }
        }
        .option-item.selected {
            background: #dbeafe;
            border-color: var(--active-outline);
        }
        @media (prefers-color-scheme: dark) {
            .option-item.selected {
                background: #1a3a5a;
                border-color: var(--active-outline);
            }
        }
        .option-item.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .option-item.disabled:hover {
            background: var(--bg-option);
        }
        .option-item input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: var(--active-outline);
            flex-shrink: 0;
            cursor: pointer;
        }
        .option-item.disabled input[type="radio"] {
            cursor: not-allowed;
        }
        .option-label {
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 450;
            cursor: pointer;
        }
        .option-item.disabled .option-label {
            cursor: not-allowed;
        }
        .option-item.forgot-option {
            background: #fef9e7;
            border-color: #fcd34d;
        }
        .option-item.forgot-option:hover:not(.disabled) {
            background: #fef3c7;
        }
        .option-item.forgot-option.selected {
            background: #fbbf24;
            border-color: #d97706;
        }
        @media (prefers-color-scheme: dark) {
            .option-item.forgot-option {
                background: #3a2a0a;
                border-color: #a16207;
            }
            .option-item.forgot-option:hover:not(.disabled) {
                background: #4a3a0a;
            }
            .option-item.forgot-option.selected {
                background: #a16207;
                border-color: #ca8a04;
            }
        }
        .feedback-area {
            margin-top: auto;
            padding: 12px 16px;
            background: var(--bg-feedback);
            border: 1px solid var(--feedback-border);
            font-size: 16px;
            font-weight: 500;
            min-height: 52px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            transition: background 0.2s;
        }
        .feedback-correct {
            color: var(--feedback-correct-text);
            background: var(--feedback-correct-bg);
            border-color: #86efac;
        }
        .feedback-wrong {
            color: var(--feedback-wrong-text);
            background: var(--feedback-wrong-bg);
            border-color: #fca5a5;
        }
        .feedback-forgot {
            color: #92400e;
            background: #fef3c7;
            border-color: #fcd34d;
        }
        @media (prefers-color-scheme: dark) {
            .feedback-forgot {
                color: #fbbf24;
                background: #3a2a0a;
                border-color: #a16207;
            }
        }
        .feedback-empty {
            color: var(--text-secondary);
            background: var(--bg-feedback);
        }
        .feedback-correct-answer {
            font-weight: 400;
            color: var(--feedback-correct-text);
            background: var(--feedback-correct-bg);
            padding: 2px 10px;
            border: 1px solid #86efac;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 18px;
            gap: 12px;
        }
        .btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            padding: 8px 20px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-primary {
            background: var(--active-outline);
            border-color: var(--active-outline);
            color: white;
        }
        .btn-primary:hover {
            filter: brightness(0.9);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-outline:hover {
            background: var(--bg-feedback);
        }
        .btn:active {
            transform: scale(0.97);
        }

        /* 结果页面 */
        .result-content {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 8px 0;
        }
        .result-content.visible {
            display: flex;
        }
        .result-stats {
            background: var(--result-stats-bg);
            padding: 16px 20px;
            border: 1px solid var(--result-border);
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            font-size: 17px;
            color: var(--text-primary);
            flex-wrap: wrap;
        }
        .result-stats span {
            font-weight: 600;
        }
        .result-stats .correct-count { color: var(--correct-bg); }
        .result-stats .wrong-count { color: var(--wrong-bg); }
        .result-stats .forgot-count { color: var(--forgot-bg); }

        .result-errors {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--result-border);
            padding: 14px 18px;
            background: var(--bg-container);
            color: var(--text-primary);
        }
        .result-errors h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-primary);
        }
        .error-item {
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
        }
        .error-item:last-child {
            border-bottom: none;
        }
        .error-item .qid {
            font-weight: 600;
            color: var(--active-outline);
        }
        .error-item .qtext {
            margin: 4px 0 6px 0;
            font-weight: 500;
        }
        .error-item .answer-detail {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .error-item .answer-detail .correct-ans {
            color: var(--correct-bg);
        }
        .error-item .answer-detail .your-ans {
            color: var(--wrong-bg);
        }
        .error-item .answer-detail .forgot-tag {
            color: var(--forgot-bg);
            font-weight: 600;
        }

        .export-btn {
            margin-top: 18px;
            align-self: flex-end;
            padding: 8px 24px;
            background: var(--active-outline);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .export-btn:hover {
            filter: brightness(0.9);
        }

        .hidden {
            display: none !important;
        }

        /* 直角统一 */
        .grid-cell, .option-item, .feedback-area, .btn, .result-stats, .result-errors, .export-btn {
            border-radius: 0 !important;
        }
        .exam-container, .grid-nav, .question-panel {
            border-radius: 0 !important;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-feedback); }
        ::-webkit-scrollbar-thumb { background: var(--cell-border); }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            .exam-container {
                flex-direction: column;
                height: auto;
                min-height: 90vh;
                position: relative;
            }
            .grid-nav {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                max-height: 400px;
                transform: scaleY(0);
                transform-origin: top center;
                padding: 0 12px;
                height: 0;
                overflow: hidden;
                transition: transform 0.3s ease, height 0.3s ease, padding 0.3s ease;
                padding: 0 12px;
            }
            .grid-nav.open {
                transform: scaleY(1);
                height: auto;
                max-height: 400px;
                padding: 16px 12px;
                overflow-y: auto;
            }
            .toggle-nav-btn {
                display: block;
                left: 12px;
                top: 12px;
                font-size: 22px;
                padding: 4px 14px;
            }
            .question-panel {
                padding: 18px 16px;
                padding-top: 50px;
            }
            .grid-10x10 {
                grid-template-columns: repeat(5, 1fr);
                gap: 3px;
            }
            .grid-cell {
                font-size: 12px;
            }
            .legend {
                font-size: 11px;
                gap: 8px;
            }
            .result-stats {
                flex-wrap: wrap;
                gap: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
<div class="exam-container" id="app">
    <!-- 折叠按钮（手机端显示） -->
    <button class="toggle-nav-btn" id="toggleNavBtn">☰</button>

    <!-- 左侧网格 -->
    <div class="grid-nav" id="gridNav">
        <h2>题号</h2>
        <div class="grid-10x10" id="gridContainer"></div>
        <div class="legend">
            <span class="legend-item"><span class="legend-swatch green"></span> 正确</span>
            <span class="legend-item"><span class="legend-swatch red"></span> 错误</span>
            <span class="legend-item"><span class="legend-swatch yellow"></span> 忘了</span>
            <span class="legend-item"><span class="legend-swatch gray"></span> 未答</span>
        </div>
        <div class="progress-stats" id="progressStats">0 / 100 已作答</div>
    </div>

    <!-- 右侧面板 -->
    <div class="question-panel" id="questionPanel">
        <!-- 正常答题内容 -->
        <div class="question-content" id="questionContent">
            <div class="question-header">
                <div class="question-number" id="qNumber">第 1 题 <span>/ 100</span></div>
                <div class="question-type">单选题</div>
            </div>
            <div class="question-text" id="qText">加载题目中...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback-area feedback-empty" id="feedbackArea">选择选项后自动判断</div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="prevBtn" disabled>上一题</button>
                <button class="btn btn-primary" id="nextBtn">下一题</button>
            </div>
        </div>

        <!-- 结果页面 -->
        <div class="result-content" id="resultContent">
            <div class="result-stats" id="resultStats">
                <div>总题数：<span id="totalCount">100</span></div>
                <div>正确：<span class="correct-count" id="correctCount">0</span></div>
                <div>错误：<span class="wrong-count" id="wrongCount">0</span></div>
                <div>忘了：<span class="forgot-count" id="forgotCount">0</span></div>
            </div>
            <div class="result-errors" id="resultErrors">
                <h3>错题 & 忘记的题目</h3>
                <div id="errorList"></div>
            </div>
            <button class="export-btn" id="exportBtn">导出错题</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 题库 (100题) 根据复习资料更新，答案来自用户提供的序列 ----------
        const QUESTIONS = [
            { id: 1, text: '刘文金的二胡曲《三门峡畅想曲》创作于（ ）。', options: ['A.20世纪30年代', 'B.20世纪60年代', 'C.20世纪80年代'], answer: 1 }, // B
            { id: 2, text: '下列属于光绪年间京剧“新三鼎甲”人物的是（ ）。', options: ['A.梅兰芳', 'B.尚小云', 'C.谭鑫培'], answer: 2 }, // C
            { id: 3, text: '儿童歌舞剧《小小画家》的编创者是（ ）。', options: ['A.刘质平', 'B.黎锦晖', 'C.邱望湘'], answer: 1 }, // B
            { id: 4, text: '上世纪60年代作曲家（ ）以西南少数民族音乐为题材创作了琵琶曲《彝族舞曲》。', options: ['A.刘文金', 'B.王惠然', 'C.刘德海'], answer: 1 }, // B
            { id: 5, text: '无伴奏合唱《牧歌》的作曲者是（ ）。', options: ['A.麦丁', 'B.郑律成', 'C.瞿希贤'], answer: 2 }, // C
            { id: 6, text: '琵琶曲《天鹅》的作曲者是（ ）。', options: ['A.徐昌俊', 'B.刘德海', 'C.郭文景'], answer: 1 }, // B
            { id: 7, text: '（ ）被誉为我国近代专业音乐教育的奠基人和开拓者。', options: ['A.赵梅伯', 'B.应尚能', 'C.萧友梅'], answer: 2 }, // C
            { id: 8, text: '马思聪40年代曾创作著名的三部大合唱作品，即《民主大合唱》、《春天大合唱》和（ ）等。', options: ['A.《生产大合唱》', 'B.《九一八大合唱》', 'C.《祖国大合唱》'], answer: 2 }, // C
            { id: 9, text: '著名小提琴协奏曲《梁山伯与祝英台》最初是由（ ）根据越剧音乐创作的弦乐四重奏。', options: ['A.何占豪', 'B.陈钢', 'C.杜鸣心'], answer: 0 }, // A
            { id: 10, text: '黎锦晖的儿童歌舞音乐宣扬了“真、善、美”的精神，如《麻雀与小孩》、《葡萄仙子》（ ）等作品。', options: ['A.《可怜的秋香》', 'B.《湘累》', 'C.《军民进行曲》'], answer: 0 }, // A
            { id: 11, text: '管弦乐作品《森吉德玛》是（ ）的代表作。', options: ['A.江文也', 'B.贺绿汀', 'C.洗星海'], answer: 1 }, // B
            { id: 12, text: '1934年“征求有中国风味钢琴曲”创作比赛是由美籍俄裔作曲家、钢琴家（ ）举办的。', options: ['A.齐尔品', 'B.贺绿汀', 'C.萧友梅'], answer: 0 }, // A

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressStats = document.getElementById('progressStats');
        const questionContent = document.getElementById('questionContent');
        const resultContent = document.getElementById('resultContent');
        const errorList = document.getElementById('errorList');
        const exportBtn = document.getElementById('exportBtn');
        const gridNav = document.getElementById('gridNav');
        const toggleBtn = document.getElementById('toggleNavBtn');

        // ---------- 折叠功能 ----------
        let navOpen = false;
        toggleBtn.addEventListener('click', function() {
            navOpen = !navOpen;
            gridNav.classList.toggle('open', navOpen);
            toggleBtn.textContent = navOpen ? '✕' : '☰';
        });
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                gridNav.classList.add('open');
                navOpen = true;
                toggleBtn.textContent = '✕';
            } else {
                if (!navOpen) {
                    gridNav.classList.remove('open');
                    toggleBtn.textContent = '☰';
                }
            }
        });
        if (window.innerWidth > 768) {
            gridNav.classList.add('open');
            navOpen = true;
            toggleBtn.textContent = '✕';
        } else {
            gridNav.classList.remove('open');
            navOpen = false;
            toggleBtn.textContent = '☰';
        }

        // ---------- 网格 ----------
        function renderGrid() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < total; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.textContent = i + 1;
                const result = judgeResult[i];
                if (result === 'correct') cell.classList.add('correct');
                else if (result === 'wrong') cell.classList.add('wrong');
                else if (result === 'forgot') cell.classList.add('forgot');
                else cell.classList.add('empty');
                if (i === currentIndex) cell.classList.add('active');
                cell.addEventListener('click', () => goToQuestion(i));
                gridContainer.appendChild(cell);
            }
            updateProgressStats();
        }

        function updateProgressStats() {
            const answered = judgeResult.filter(r => r !== null).length;
            progressStats.textContent = `${answered} / ${total} 已作答`;
        }

        function updateGridCell(index) {
            const cells = document.querySelectorAll('.grid-cell');
            const cell = cells[index];
            if (!cell) return;
            cell.className = 'grid-cell';
            const result = judgeResult[index];
            if (result === 'correct') cell.classList.add('correct');
            else if (result === 'wrong') cell.classList.add('wrong');
            else if (result === 'forgot') cell.classList.add('forgot');
            else cell.classList.add('empty');
            if (index === currentIndex) cell.classList.add('active');
        }

        // ---------- 渲染题目 ----------
        function renderQuestion(index) {
            const q = QUESTIONS[index];
            qNumber.innerHTML = `第 ${index+1} 题 <span>/ ${total}</span>`;
            qText.textContent = q.text;

            optionsContainer.innerHTML = '';
            const isAnswered = (selected[index] !== null);
            // 构建选项：正常选项 + “我忘了”
            const forgotIndex = q.options.length; // 特殊标记

            q.options.forEach((opt, optIndex) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                if (selected[index] === optIndex) div.classList.add('selected');
                if (isAnswered) div.classList.add('disabled');

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'question';
                radio.value = optIndex;
                radio.checked = (selected[index] === optIndex);
                radio.disabled = isAnswered;

                div.addEventListener('click', function(e) {
                    if (e.target.tagName === 'INPUT') return;
                    if (isAnswered) return;
                    const radioInput = this.querySelector('input[type="radio"]');
                    if (radioInput) {
                        radioInput.checked = true;
                        const changeEvent = new Event('change', { bubbles: true });
                        radioInput.dispatchEvent(changeEvent);
                    }
                });

                radio.addEventListener('change', (e) => {
                    if (e.target.checked && !isAnswered) {
                        handleOptionSelect(index, optIndex);
                    }
                });

                const label = document.createElement('span');
                label.className = 'option-label';
                label.textContent = opt;
                div.appendChild(radio);
                div.appendChild(label);
                optionsContainer.appendChild(div);
            });

            // 添加“我忘了”选项
            const forgotDiv = document.createElement('div');
            forgotDiv.className = 'option-item forgot-option';
            if (selected[index] === 'forgot') forgotDiv.classList.add('selected');
            if (isAnswered) forgotDiv.classList.add('disabled');

            const forgotRadio = document.createElement('input');
            forgotRadio.type = 'radio';
            forgotRadio.name = 'question';
            forgotRadio.value = 'forgot';
            forgotRadio.checked = (selected[index] === 'forgot');
            forgotRadio.disabled = isAnswered;

            forgotDiv.addEventListener('click', function(e) {
                if (e.target.tagName === 'INPUT') return;
                if (isAnswered) return;
                const radioInput = this.querySelector('input[type="radio"]');
                if (radioInput) {
                    radioInput.checked = true;
                    const changeEvent = new Event('change', { bubbles: true });
                    radioInput.dispatchEvent(changeEvent);
                }
            });

            forgotRadio.addEventListener('change', (e) => {
                if (e.target.checked && !isAnswered) {
                    handleForgot(index);
                }
            });

            const forgotLabel = document.createElement('span');
            forgotLabel.className = 'option-label';
            forgotLabel.textContent = '我忘了';
            forgotDiv.appendChild(forgotRadio);
            forgotDiv.appendChild(forgotLabel);
            optionsContainer.appendChild(forgotDiv);

            // 反馈区域
            const result = judgeResult[index];
            if (result === 'correct') {
                feedbackArea.className = 'feedback-area feedback-correct';
                feedbackArea.innerHTML = '回答正确';
            } else if (result === 'wrong') {
                const correctAns = q.options[q.answer];
                feedbackArea.className = 'feedback-area feedback-wrong';
                feedbackArea.innerHTML = `回答错误，正确答案是：<span class="feedback-correct-answer">${correctAns}</span>`;
            } else if (result === 'forgot') {
                const correctAns = q.options[q.answer];
                feedbackArea.className = 'feedback-area feedback-forgot';
                feedbackArea.innerHTML = `你忘了，正确答案是：<span class="feedback-correct-answer">${correctAns}</span>`;
            } else {
                feedbackArea.className = 'feedback-area feedback-empty';
                feedbackArea.textContent = '选择选项后自动判断';
            }

            prevBtn.disabled = (index === 0);
            nextBtn.textContent = (index === total - 1) ? '完成' : '下一题';

            document.querySelectorAll('.grid-cell').forEach((cell, i) => {
                cell.classList.toggle('active', i === index);
            });
        }

        // ---------- 选择处理 ----------
        function handleOptionSelect(index, optionIndex) {
            if (selected[index] !== null) return;
            selected[index] = optionIndex;
            const q = QUESTIONS[index];
            const isCorrect = (optionIndex === q.answer);
            judgeResult[index] = isCorrect ? 'correct' : 'wrong';

            renderQuestion(index);
            updateGridCell(index);
            updateProgressStats();
            checkAllDone();
        }

        function handleForgot(index) {
            if (selected[index] !== null) return;
            selected[index] = 'forgot';
            judgeResult[index] = 'forgot';

            renderQuestion(index);
            updateGridCell(index);
            updateProgressStats();
            checkAllDone();
        }

        // ---------- 跳转 ----------
        function goToQuestion(index) {
            if (index < 0 || index >= total) return;
            currentIndex = index;
            if (isResultShown) {
                hideResult();
            }
            renderQuestion(index);
            document.querySelectorAll('.grid-cell').forEach((cell, i) => {
                cell.classList.toggle('active', i === index);
            });
            if (window.innerWidth <= 768) {
                gridNav.classList.remove('open');
                navOpen = false;
                toggleBtn.textContent = '☰';
            }
        }

        // ---------- 完成检测 ----------
        function checkAllDone() {
            const allDone = judgeResult.every(r => r !== null);
            if (allDone && !isResultShown) {
                showResult();
            } else if (!allDone && isResultShown) {
                hideResult();
            }
        }

        // ---------- 显示结果 ----------
        function showResult() {
            isResultShown = true;
            questionContent.classList.add('hidden');
            resultContent.classList.add('visible');

            const correct = judgeResult.filter(r => r === 'correct').length;
            const wrong = judgeResult.filter(r => r === 'wrong').length;
            const forgot = judgeResult.filter(r => r === 'forgot').length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('forgotCount').textContent = forgot;

            errorList.innerHTML = '';
            const errors = [];
            for (let i = 0; i < total; i++) {
                if (judgeResult[i] === 'wrong' || judgeResult[i] === 'forgot') {
                    const q = QUESTIONS[i];
                    const userAns = selected[i];
                    const correctAns = q.answer;
                    errors.push({
                        index: i,
                        question: q,
                        userChoice: userAns,
                        correctChoice: correctAns,
                        isForgot: (judgeResult[i] === 'forgot')
                    });
                }
            }
            if (errors.length === 0) {
                errorList.innerHTML = '<p style="color:var(--correct-bg); font-weight:500;">恭喜你，全部回答正确！</p>';
            } else {
                errors.forEach(err => {
                    const div = document.createElement('div');
                    div.className = 'error-item';
                    const qid = document.createElement('div');
                    qid.className = 'qid';
                    qid.textContent = `第 ${err.index+1} 题`;
                    const qtext = document.createElement('div');
                    qtext.className = 'qtext';
                    qtext.textContent = err.question.text;
                    const detail = document.createElement('div');
                    detail.className = 'answer-detail';
                    const userDisplay = err.isForgot ? '<span class="forgot-tag">我忘了</span>' : err.question.options[err.userChoice];
                    detail.innerHTML = `
                        <span class="correct-ans">正确答案：${err.question.options[err.correctChoice]}</span>
                        <span style="margin:0 8px;">|</span>
                        <span class="your-ans">你的答案：${userDisplay}</span>
                    `;
                    div.appendChild(qid);
                    div.appendChild(qtext);
                    div.appendChild(detail);
                    errorList.appendChild(div);
                });
            }
        }

        function hideResult() {
            isResultShown = false;
            questionContent.classList.remove('hidden');
            resultContent.classList.remove('visible');
        }

        // ---------- 导出错题 ----------
        function exportErrors() {
            const errors = [];
            for (let i = 0; i < total; i++) {
                if (judgeResult[i] === 'wrong' || judgeResult[i] === 'forgot') {
                    const q = QUESTIONS[i];
                    errors.push({
                        index: i,
                        question: q,
                        userChoice: selected[i],
                        correctChoice: q.answer,
                        isForgot: (judgeResult[i] === 'forgot')
                    });
                }
            }
            if (errors.length === 0) {
                alert('没有错题，无需导出。');
                return;
            }
            let content = '错题集\n';
            content += '================================\n\n';
            errors.forEach(err => {
                content += `第 ${err.index+1} 题\n`;
                content += `题目：${err.question.text}\n`;
                content += `正确答案：${err.question.options[err.correctChoice]}\n`;
                const userDisplay = err.isForgot ? '我忘了' : err.question.options[err.userChoice];
                content += `你的答案：${userDisplay}\n`;
                content += '--------------------------------\n\n';
            });
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '错题集.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        // ---------- 事件绑定 ----------
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) goToQuestion(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < total - 1) {
                goToQuestion(currentIndex + 1);
            } else {
                if (judgeResult.every(r => r !== null)) {
                    if (!isResultShown) showResult();
                } else {
                    alert('还有题目未作答，请完成所有题目。');
                }
            }
        });

        exportBtn.addEventListener('click', exportErrors);

        // ---------- 初始化 ----------
        function init() {
            renderGrid();
            goToQuestion(0);
            checkAllDone();
        }

        init();
    })();
</script>
</body>
</html>
